<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Backend</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>🏥 Teste Backend</h1>
    <button onclick="testHealth()">Testar Health Check</button>
    <button onclick="testLogin()">Testar Login</button>
    <div id="results"></div>

    <script>
        function log(message, type = 'info', data = null) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `result ${type}`;
            
            let content = message;
            if (data) {
                content += '\n' + JSON.stringify(data, null, 2);
            }
            
            div.innerHTML = `<pre>${content}</pre>`;
            results.appendChild(div);
        }

        async function testHealth() {
            try {
                log('Testando health check...', 'info');
                const response = await fetch('http://localhost:3001/health');
                
                if (response.ok) {
                    const data = await response.json();
                    log('✅ Backend funcionando!', 'success', data);
                } else {
                    log('❌ Backend respondeu com erro', 'error', { status: response.status });
                }
            } catch (error) {
                log('❌ Erro de conexão com backend', 'error', error.message);
            }
        }

        async function testLogin() {
            try {
                log('Testando login...', 'info');
                const response = await fetch('http://localhost:3001/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'admin@restaurant.local',
                        password: 'RestaurantAdmin2024!'
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    log('✅ Login funcionando!', 'success', { userId: data.data.user.id });
                } else {
                    const error = await response.json();
                    log('❌ Erro no login', 'error', error);
                }
            } catch (error) {
                log('❌ Erro de conexão no login', 'error', error.message);
            }
        }
    </script>
</body>
</html>
