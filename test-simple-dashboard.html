<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Simples Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 3px; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
    <h1>🧪 Teste Simples Dashboard</h1>
    
    <button onclick="testCompleteFlow()">🚀 Testar Fluxo Completo</button>
    <button onclick="clearLocalStorage()">🧹 Limpar localStorage</button>
    
    <div id="results"></div>

    <script>
        async function log(message, type = 'info', data = null) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `result ${type}`;
            
            let content = message;
            if (data) {
                content += '\n' + JSON.stringify(data, null, 2);
            }
            
            div.innerHTML = `<pre>${content}</pre>`;
            results.appendChild(div);
            console.log(message, data);
        }

        function clearLocalStorage() {
            localStorage.clear();
            document.getElementById('results').innerHTML = '';
            log('localStorage limpo', 'success');
        }

        async function testCompleteFlow() {
            document.getElementById('results').innerHTML = '';
            
            try {
                // Passo 1: Login
                log('1. Fazendo login...', 'info');
                const loginResponse = await fetch('http://localhost:3001/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'admin@restaurant.local',
                        password: 'RestaurantAdmin2024!'
                    })
                });

                if (!loginResponse.ok) {
                    log('❌ Erro no login', 'error', await loginResponse.json());
                    return;
                }

                const loginData = await loginResponse.json();
                const token = loginData.data.token;
                const user = loginData.data.user;
                
                log('✅ Login realizado com sucesso', 'success', { userId: user.id, email: user.email });
                
                // Salvar no localStorage como o frontend faz
                localStorage.setItem('token', token);
                localStorage.setItem('user', JSON.stringify(user));

                // Passo 2: Simular seleção de restaurante
                log('2. Simulando seleção de restaurante...', 'info');
                const selectedRestaurant = {
                    id: 'restaurant-001',
                    name: 'La Bella Vista',
                    address: 'Hauptstraße 123, 10115 Berlin',
                    color: '#c54f42'
                };
                localStorage.setItem('selectedRestaurant', JSON.stringify(selectedRestaurant));
                
                log('✅ Restaurante selecionado', 'success', selectedRestaurant);

                // Passo 3: Tentar carregar dados do dashboard
                log('3. Carregando dados do dashboard...', 'info');
                const dashboardResponse = await fetch('http://localhost:3001/api/dashboard/restaurant-001/data', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                    },
                });

                log(`📡 Status da resposta: ${dashboardResponse.status}`, 'info');

                if (dashboardResponse.ok) {
                    const dashboardData = await dashboardResponse.json();
                    log('✅ Dados do dashboard carregados com sucesso!', 'success', dashboardData);
                    
                    // Teste se os dados estão no formato correto
                    if (dashboardData.data && dashboardData.data.stats) {
                        log('✅ Estrutura dos dados está correta', 'success');
                        log('📊 Stats encontradas:', 'info', dashboardData.data.stats);
                    } else {
                        log('⚠️ Estrutura dos dados pode estar incorreta', 'error', dashboardData);
                    }
                } else {
                    const errorData = await dashboardResponse.json().catch(() => ({}));
                    log('❌ Erro ao carregar dashboard', 'error', {
                        status: dashboardResponse.status,
                        statusText: dashboardResponse.statusText,
                        error: errorData
                    });
                }

                // Passo 4: Testar validação do token
                log('4. Validando token...', 'info');
                const verifyResponse = await fetch('http://localhost:3001/api/auth/verify', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                    },
                });

                if (verifyResponse.ok) {
                    const verifyData = await verifyResponse.json();
                    log('✅ Token é válido', 'success', verifyData);
                } else {
                    log('❌ Token inválido', 'error', await verifyResponse.json());
                }

            } catch (error) {
                log('❌ Erro no teste:', 'error', error.message);
            }
        }

        // Auto-executar se há dados no localStorage
        window.onload = function() {
            const token = localStorage.getItem('token');
            const restaurant = localStorage.getItem('selectedRestaurant');
            
            if (token && restaurant) {
                log('🔑 Dados encontrados no localStorage', 'info', {
                    hasToken: !!token,
                    hasRestaurant: !!restaurant
                });
            }
        };
    </script>
</body>
</html>
